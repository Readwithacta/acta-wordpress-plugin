name: Release Plugin

# Triggers on every push to main.
# Do all your work on `develop`, then push to main when ready to release:
#
#   git push origin develop:main
#
# That's it. No keywords, no manual steps, no rebasing.

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Generate CalVer version from UTC timestamp (e.g. 2026.03.04.1423) ──
      - name: Generate version
        id: version
        run: |
          VERSION=$(date -u +'%Y.%m.%d.%H%M')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Releasing version: $VERSION"

      # ── Stamp version into files (build-time only, never committed back) ───
      - name: Stamp version into plugin files
        run: |
          V="${{ steps.version.outputs.VERSION }}"
          # Production plugin
          sed -i "s/ \* Version:.*/ * Version:     $V/" acta-content.php
          sed -i "s/define( 'ACTA_PLUGIN_VERSION', '.*' );/define( 'ACTA_PLUGIN_VERSION', '$V' );/" acta-content.php
          # Dev plugin
          sed -i "s/ \* Version:.*/ * Version:     $V-dev/" acta-content-dev.php
          sed -i "s/define( 'ACTA_DEV_PLUGIN_VERSION', '.*' );/define( 'ACTA_DEV_PLUGIN_VERSION', '$V-dev' );/" acta-content-dev.php
          # readme.txt stable tag
          sed -i "s/^Stable tag:.*/Stable tag: $V/" readme.txt

      # ── Build WP.org plugin file (strip direct-distribution-only blocks) ────
      # Removes everything between // @wporg-strip-start and // @wporg-strip-end
      # (inclusive). The result is safe for WordPress.org SVN — no custom update
      # server calls, no forced auto-update filter.
      - name: Build WP.org plugin file
        run: |
          awk '/@wporg-strip-start/{skip=1} !skip{print} /@wporg-strip-end/{skip=0}' \
            acta-content.php | cat -s > acta-content-wporg.php

      # ── Build WP.org readme (strip direct-distribution-only lines) ─────────
      # Removes the update-check line — WP.org uses its own update system.
      - name: Build WP.org readme
        run: |
          awk '!/periodically checks.*plugin updates/' readme.txt > readme-wporg.txt

      # ── Build ZIPs ──────────────────────────────────────────────────────────
      - name: Build plugin ZIPs
        run: |
          mkdir -p build

          COMMON_EXCLUDES=(
            --exclude='.git'
            --exclude='.github'
            --exclude='build'
            --exclude='build-dev.sh'
            --exclude='release.sh'
            --exclude='AGENTS.md'
            --exclude='CHANGELOG.md'
            --exclude='*.zip'
            --exclude='OLD'
            --exclude='*.checkpoint.php'
            --exclude='.DS_Store'
            --exclude='acta-content-wporg.php'
            --exclude='readme-wporg.txt'
          )

          # Production ZIP — acta-content.zip (direct distribution, full file)
          rsync -r "${COMMON_EXCLUDES[@]}" \
            --exclude='acta-content-dev.php' \
            . build/acta-content/
          cd build && zip -r acta-content.zip acta-content/ && cd ..
          echo "Prod ZIP:   $(du -sh build/acta-content.zip | cut -f1)"

          # Dev ZIP — acta-content-dev.zip
          rsync -r "${COMMON_EXCLUDES[@]}" \
            --exclude='acta-content.php' \
            . build/acta-content-dev/
          cd build && zip -r acta-content-dev.zip acta-content-dev/ && cd ..
          echo "Dev ZIP:    $(du -sh build/acta-content-dev.zip | cut -f1)"

          # WP.org ZIP — acta-content-wporg.zip (stripped, SVN-ready)
          rsync -r "${COMMON_EXCLUDES[@]}" \
            --exclude='acta-content-dev.php' \
            --exclude='acta-content.php' \
            . build/acta-content-wporg/
          # Replace the main plugin file with the stripped WP.org version
          cp acta-content-wporg.php build/acta-content-wporg/acta-content.php
          # Replace readme with stripped version (no update-check line)
          cp readme-wporg.txt build/acta-content-wporg/readme.txt
          cd build && zip -r acta-content-wporg.zip acta-content-wporg/ && cd ..
          echo "WP.org ZIP: $(du -sh build/acta-content-wporg.zip | cut -f1)"

      # ── Create GitHub Release ───────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: v${{ steps.version.outputs.VERSION }}
          generate_release_notes: true
          files: |
            build/acta-content.zip
            build/acta-content-dev.zip
            build/acta-content-wporg.zip
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Notify Acta update server ────────────────────────────────────────────
      # Publishers check api.readwithacta.com instead of GitHub — no rate limits.
      # Requires PLUGIN_UPDATE_WEBHOOK_SECRET set in GitHub repo secrets.
      - name: Notify Acta update server
        run: |
          V="${{ steps.version.outputs.VERSION }}"
          BASE="https://github.com/Readwithacta/acta-wordpress-plugin/releases/download/$V"
          SECRET="${{ secrets.PLUGIN_UPDATE_WEBHOOK_SECRET }}"

          curl -sf -X POST "https://api.readwithacta.com/api/v1/plugin-updates/acta-content" \
            -H "Authorization: Bearer $SECRET" \
            -H "Content-Type: application/json" \
            -d "{\"version\":\"$V\",\"download_url\":\"$BASE/acta-content.zip\"}"

          curl -sf -X POST "https://api.readwithacta.com/api/v1/plugin-updates/acta-content-dev" \
            -H "Authorization: Bearer $SECRET" \
            -H "Content-Type: application/json" \
            -d "{\"version\":\"${V}-dev\",\"download_url\":\"$BASE/acta-content-dev.zip\"}"

